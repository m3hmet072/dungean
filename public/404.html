<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0; url=/dungean/#" />
    <script>
      (function() {
        var base = '/dungean/';
        var path = window.location.pathname.replace(base, '').replace(/^[\/]+/, '');
        var target = base + '#' + path + window.location.search;
        window.location.replace(target);
      })();
    </script>
    <title>Redirecting...</title>
  </head>
  <body>
    Redirecting...
  </body>
</html>
